<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Το Πρώτο μας Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            color: #333;
        }
        header {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 20px 0;
        }
        nav {
            background-color: #34495e;
            text-align: center;
            padding: 10px 0;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 18px;
            font-weight: bold;
        }
        nav a:hover {
            color: #3498db;
        }
        main {
            padding: 40px 20px;
            text-align: center;
            min-height: 400px;
        }
        .highlight {
            color: #e74c3c;
        }
        footer {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 10px 0;
            position: relative;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>

    <header>
        <h1>Καλώς ήρθατε στο Project μας!</h1>
    </header>

    <nav>
        <a href="#section-about">Σχετικά</a>
        <a href="#section-code">Κώδικας</a>
        <a href="#section-contact">Επικοινωνία</a>
    </nav>

    <main>
        <h2 id="section-about">Αυτό είναι ένα <span class="highlight">Live Website</span> στο GitHub</h2>
        <p>Χρησιμοποιούμε HTML και CSS για να δώσουμε δομή και χρώμα στη σελίδα μας.</p>
        <p>Το μενού από πάνω λειτουργεί ως "ασανσέρ" (εσωτερικά links) για την ίδια σελίδα!</p>
    </main>

    <footer id="section-contact">
        <p>Δημιουργήθηκε με κώδικα και υπομονή 🚀</p>
    </footer>

</body>
</html>
